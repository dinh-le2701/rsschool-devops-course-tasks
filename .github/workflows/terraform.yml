name: K8s Cluster Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform AWS Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1

      - name: Initialize Terraform
        run: terraform init

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Save Outputs
        run: echo "::set-output name=master_public_ip::$(terraform output -raw k3s_master_public_ip)"
  
  k3s_cluster:
    name: K3s Cluster Setup
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: SSH to K3s Master and Install K3s
        run: |
          ssh -o StrictHostKeyChecking=no -i my-ec2-key-pair.pem ec2-user@${{ needs.terraform.outputs.master_public_ip }} << EOF
          curl -sfL https://get.k3s.io | sh -
          EOF
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
  verify_cluster:
    name: Verify K3s Cluster
    needs: k3s_cluster
    runs-on: ubuntu-latest
    steps:
      - name: SSH to K3s Master and Check Nodes
        run: |
          ssh -o StrictHostKeyChecking=no -i my-ec2-key-pair.pem ec2-user@${{ needs.terraform.outputs.master_public_ip }} << EOF
          sudo k3s kubectl get nodes
          EOF
          
  deploy_workload:
    name: Deploy Simple Workload
    needs: verify_cluster
    runs-on: ubuntu-latest
    steps:
      - name: SSH to K3s Master and Deploy Workload
        run: |
          ssh -o StrictHostKeyChecking=no -i my-ec2-key-pair.pem ec2-user@${{ needs.terraform.outputs.master_public_ip }} << EOF
          sudo k3s kubectl apply -f https://k8s.io/examples/pods/simple-pod.yaml
          sudo k3s kubectl get pods
          EOF

  setup_monitoring:
    name: Set Up Monitoring
    needs: deploy_workload
    runs-on: ubuntu-latest
    steps:
      - name: SSH to K3s Master and Set Up Monitoring
        run: |
          ssh -o StrictHostKeyChecking=no -i my-ec2-key-pair.pem ec2-user@${{ needs.terraform.outputs.master_public_ip }} << EOF
          # Install Helm if not installed
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          # Add Prometheus and Grafana Helm repos
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          # Install Prometheus
          helm install prometheus prometheus-community/prometheus --namespace monitoring --create-namespace
          # Install Grafana
          helm install grafana grafana/grafana --namespace monitoring
          EOF
