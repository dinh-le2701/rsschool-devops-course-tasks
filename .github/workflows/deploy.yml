name: CI/CD Pipeline

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION : "us-east-1"
  PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
  PRIVATE_KEY: ${{secrets.PRIVATE_KEY}}

jobs:
  terraform_check:
    runs-on: ubuntu-latest
    name: Terraform check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-region: ${{ env.AWS_REGION }}
            role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform check
        run: terraform fmt


  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform_check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            aws-region: ${{ env.AWS_REGION }}
            role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Copy SSH-key
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/test
          chmod 600 ~/.ssh/test
          echo "$PUBLIC_KEY" > ~/.ssh/test.pub

      - name: Terraform init shared states
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
    
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve
          sleep 240

      - name: Set env
        run: echo "HOST_PUBLIC_IP=$(terraform output -raw bastion_host_public_ip)" >> $GITHUB_ENV

      - name: Install Jenkins
        run: |
          scp -r -o StrictHostKeyChecking=no -i ~/.ssh/test ./helm ubuntu@$HOST_PUBLIC_IP:/home/ubuntu
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/test ubuntu@$HOST_PUBLIC_IP << 'EOF'
          export KUBECONFIG=~/.kube/config
          helm repo add jenkinsci https://charts.jenkins.io
          helm repo update
          kubectl apply -f ~/helm/jenkins-volume.yaml
          kubectl create namespace jenkins
          kubectl apply -f ~/helm/jenkins-sa.yaml
          helm install jenkins -n jenkins -f ~/helm/jenkins-values.yaml jenkinsci/jenkins
          EOF
